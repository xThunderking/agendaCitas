<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de clases | Agenda Pro</title>
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">Agenda Pro</a>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="hero__content card card--wide">
        <h1>Registro de clases</h1>
        <p>Elige dia y horario de clase (lunes a viernes). Cada grupo acepta maximo 30 participantes.</p>
        <div class="hero-tags">
          <span>Clase 7:00-8:00</span>
          <span>Clase 9:00-10:00</span>
          <span>Cupo maximo 30</span>
        </div>
      </div>
    </section>

    <section class="section-grid">
      <article class="card">
        <h2>Formulario de inscripcion</h2>
        <div id="flash"></div>

        <form id="booking-form" class="form">
          <label for="last_name_paterno">Apellido paterno</label>
          <input id="last_name_paterno" name="last_name_paterno" type="text" maxlength="80" required placeholder="Ejemplo: Hernandez">

          <label for="last_name_materno">Apellido materno</label>
          <input id="last_name_materno" name="last_name_materno" type="text" maxlength="80" required placeholder="Ejemplo: Lopez">

          <label for="first_names">Nombres</label>
          <input id="first_names" name="first_names" type="text" maxlength="120" required placeholder="Ejemplo: Maria Fernanda">

          <label for="class_date">Dia de clase</label>
          <input id="class_date" name="class_date" type="date" required>
          <p id="date-status" class="date-status" aria-live="polite"></p>

          <label for="class_slot">Horario de clase</label>
          <select id="class_slot" name="class_slot" required>
            <option value="">Selecciona un horario</option>
            <option value="07:00-08:00">07:00 - 08:00</option>
            <option value="09:00-10:00">09:00 - 10:00</option>
          </select>

          <button type="submit" class="btn btn--primary">Registrarme</button>
        </form>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>Agenda de Citas - Sistema Web Profesional</p>
  </footer>

  <script src="/assets/js/booking.js"></script>
</body>
</html>
