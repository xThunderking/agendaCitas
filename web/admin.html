<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registros de clases | Agenda Pro</title>
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">Agenda Pro</a>
    </div>
  </header>

  <main class="page">
    <section class="dashboard-hero card card--wide">
      <div>
        <p class="eyebrow">Panel de registros</p>
        <h1>Inscritos por clase</h1>
        <p>Revisa por dia las dos clases y su cupo actual de participantes.</p>
      </div>
    </section>

    <section class="card card--wide">
      <div id="flash"></div>

      <form id="filter-form" class="filters filters--agenda">
        <label for="date">Filtrar por dia</label>
        <input id="date" name="date" type="date">
        <button type="submit" class="btn btn--secondary">Filtrar</button>
        <button class="btn btn--ghost" id="clear-btn" type="button">Limpiar</button>
      </form>

      <div id="appointments-root" class="agenda-view"></div>
    </section>
  </main>

  <footer class="footer">
    <p>Agenda de Citas - Sistema Web Profesional</p>
  </footer>

  <script src="/assets/js/admin.js"></script>
</body>
</html>
