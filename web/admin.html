<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registros de clases | Agenda Pro</title>
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet' />
  <style>
    .modal {
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgb(0,0,0);
      background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 15% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
      max-width: 600px;
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }
    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }
    #participants-list {
      list-style-type: none;
      padding: 0;
    }
    #participants-list li {
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">Agenda Pro</a>
    </div>
  </header>

  <main class="page">
    <section class="dashboard-hero card card--wide">
      <div>
        <p class="eyebrow">Panel de registros</p>
        <h1>Calendario Diario de Clases</h1>
        <p>Revisa el calendario diario con las clases y participantes.</p>
      </div>
    </section>

    <section class="card card--wide">
      <div id="flash"></div>

      <div id="calendar"></div>
    </section>
  </main>

  <!-- Modal para lista de participantes -->
  <div id="participants-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modal-title">Participantes de la Clase</h2>
      <ul id="participants-list"></ul>
    </div>
  </div>

  <footer class="footer">
    <p>Agenda de Citas - Sistema Web Profesional</p>
  </footer>

  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
  <script src="/assets/js/admin.js"></script>
</body>
</html>
