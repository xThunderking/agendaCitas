<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar cita | Agenda Pro</title>
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">Agenda Pro</a>
    </div>
  </header>

  <main class="page">
    <section class="section-grid section-grid--single">
      <article class="card">
        <h1 id="title">Editar cita</h1>
        <div id="flash"></div>

        <form id="edit-form" class="form">
          <label for="client_name">Nombre</label>
          <input id="client_name" name="client_name" type="text" required maxlength="120">

          <label for="appointment_date">Fecha</label>
          <input id="appointment_date" name="appointment_date" type="date" required>

          <label for="appointment_time">Horario</label>
          <input id="appointment_time" name="appointment_time" type="time" required step="60">

          <label for="status">Estado</label>
          <select id="status" name="status" required>
            <option value="scheduled">Programada</option>
            <option value="cancelled">Cancelada</option>
            <option value="completed">Completada</option>
          </select>

          <button type="submit" class="btn btn--primary">Guardar cambios</button>
          <a href="/admin.html" class="btn btn--ghost">Volver</a>
        </form>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>Agenda de Citas - Sistema Web Profesional</p>
  </footer>

  <script src="/assets/js/admin-edit.js"></script>
</body>
</html>
